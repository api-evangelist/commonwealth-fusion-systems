aid: commonwealth-fusion-systems
name: Commonwealth Fusion Systems
description: >-
  Commonwealth Fusion Systems (CFS) is a commercial fusion energy company
  headquartered in Devens, Massachusetts and spun out of the MIT Plasma Science
  and Fusion Center in 2018. CFS is developing tokamak-based fusion systems
  built around high-temperature superconducting (HTS) REBCO magnet technology
  that enables substantially smaller, faster, and lower-cost fusion machines
  than prior generations. The company's technology pipeline starts with SPARC,
  a net-energy demonstration tokamak under construction at the Devens campus,
  and continues with ARC, the planned first commercial fusion power plant,
  sited in Chesterfield County, Virginia in partnership with Dominion Energy
  and targeted to deliver approximately 400 MW of electricity to the grid in
  the early 2030s. CFS is backed by a deep investor base including Breakthrough
  Energy Ventures, Eni, Equinor, Google, Temasek, Tiger Global, Khosla
  Ventures, Bill Gates, Soros Fund Management, Lowercase Capital, John Doerr,
  and TIME Ventures. CFS does not publish a public developer API or SDK;
  engagement is via partnerships, careers, and investor channels.
